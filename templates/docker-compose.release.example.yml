services:
  postgres:
    image: ${SEACONTROLL_POSTGRES_IMAGE:-ghcr.io/你的GitHub用户名/seacontroll-postgres:latest}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seacontroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seacontroll}
      POSTGRES_DB: ${POSTGRES_DB:-seacontroll}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seacontroll} -d ${POSTGRES_DB:-seacontroll}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seacontroll-http:
    image: ${SEACONTROLL_HTTP_IMAGE:-ghcr.io/你的GitHub用户名/seacontroll-http:latest}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-config", "/config/seacontroll-http.yaml"]
    ports:
      - "${HOST_HTTP_PORT:-8080}:8080"
    volumes:
      - ./config/seacontroll-http.yaml:/config/seacontroll-http.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  seacontroll-mqtt:
    image: ${SEACONTROLL_MQTT_IMAGE:-ghcr.io/你的GitHub用户名/seacontroll-mqtt:latest}
    depends_on:
      seacontroll-http:
        condition: service_healthy
    command: ["-config", "/config/seacontroll-mqtt.yaml"]
    ports:
      - "${HOST_MQTT_PORT:-1883}:1883"
      - "${HOST_MQTT_INTERNAL_PORT:-8082}:8082"
    volumes:
      - ./config/seacontroll-mqtt.yaml:/config/seacontroll-mqtt.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
