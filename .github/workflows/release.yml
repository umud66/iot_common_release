name: Build SeaControll Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本号，例如 v0.1.0
        required: true
        type: string
      backend_ref:
        description: 后端源码分支、标签或 commit
        required: true
        default: master
        type: string
      prerelease:
        description: 是否作为预发布版本
        required: true
        default: true
        type: boolean
      publish_images:
        description: 是否构建并推送 GHCR 容器镜像
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  backend:
    name: Build backend binaries
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      BACKEND_REF: ${{ inputs.backend_ref }}
      BACKEND_REPO: ${{ vars.BACKEND_REPO || 'umud66/iot_common_server' }}
      SOURCE_TOKEN: ${{ secrets.SOURCE_TOKEN }}
      IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Checkout source repositories
        run: ./scripts/checkout-sources.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sources/backend/go.mod
          cache: true
          cache-dependency-path: sources/backend/go.sum

      - name: Build backend
        run: ./scripts/build-backend.sh

      - name: Setup Docker Buildx
        if: ${{ inputs.publish_images }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.publish_images }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HTTP image
        if: ${{ inputs.publish_images }}
        uses: docker/build-push-action@v6
        with:
          context: sources/backend
          file: ./docker/backend-service.Dockerfile
          build-args: |
            APP=http
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/seacontroll-http:${{ inputs.version }}
            ${{ env.IMAGE_NAMESPACE }}/seacontroll-http:latest

      - name: Build and push MQTT image
        if: ${{ inputs.publish_images }}
        uses: docker/build-push-action@v6
        with:
          context: sources/backend
          file: ./docker/backend-service.Dockerfile
          build-args: |
            APP=mqtt
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/seacontroll-mqtt:${{ inputs.version }}
            ${{ env.IMAGE_NAMESPACE }}/seacontroll-mqtt:latest

      - name: Build and push Postgres image
        if: ${{ inputs.publish_images }}
        uses: docker/build-push-action@v6
        with:
          context: sources/backend
          file: ./docker/postgres.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/seacontroll-postgres:${{ inputs.version }}
            ${{ env.IMAGE_NAMESPACE }}/seacontroll-postgres:latest

      - name: Write release notes
        run: |
          mkdir -p dist
          cat > dist/RELEASE_NOTES.md <<'NOTES'
          ## SeaControll Release

          本 Release 由 `release` 仓库自动构建，只包含可运行产物，不包含业务源码。

          ### 产物

          - `seacontroll-http-${{ inputs.version }}-linux-amd64.tar.gz`
          - `seacontroll-http-${{ inputs.version }}-linux-arm64.tar.gz`
          - `seacontroll-http-${{ inputs.version }}-darwin-arm64.tar.gz`
          - `seacontroll-mqtt-${{ inputs.version }}-linux-amd64.tar.gz`
          - `seacontroll-mqtt-${{ inputs.version }}-linux-arm64.tar.gz`
          - `seacontroll-mqtt-${{ inputs.version }}-darwin-arm64.tar.gz`
          - `SHA256SUMS`
          - `docker-compose.release.example.yml`
          - `docker-compose.postgres-only.yml`

          ### 容器镜像

          如果本次运行启用了 `publish_images`，会推送：

          - `${{ env.IMAGE_NAMESPACE }}/seacontroll-http:${{ inputs.version }}`
          - `${{ env.IMAGE_NAMESPACE }}/seacontroll-mqtt:${{ inputs.version }}`
          - `${{ env.IMAGE_NAMESPACE }}/seacontroll-postgres:${{ inputs.version }}`

          ### 后端二进制

          - `seacontroll-http-linux-amd64`
          - `seacontroll-http-linux-arm64`
          - `seacontroll-http-darwin-arm64`
          - `seacontroll-mqtt-linux-amd64`
          - `seacontroll-mqtt-linux-arm64`
          - `seacontroll-mqtt-darwin-arm64`

          ### 源码引用

          - backend: `${{ env.BACKEND_REPO }}@${{ inputs.backend_ref }}`

          Pages 托管在 Cloudflare Pages，不参与本 Release 构建。设备固件也不参与本 Release 构建。
          NOTES

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: SeaControll ${{ inputs.version }}
          body_path: dist/RELEASE_NOTES.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/seacontroll-http-${{ inputs.version }}-linux-amd64.tar.gz
            dist/seacontroll-http-${{ inputs.version }}-linux-arm64.tar.gz
            dist/seacontroll-http-${{ inputs.version }}-darwin-arm64.tar.gz
            dist/seacontroll-mqtt-${{ inputs.version }}-linux-amd64.tar.gz
            dist/seacontroll-mqtt-${{ inputs.version }}-linux-arm64.tar.gz
            dist/seacontroll-mqtt-${{ inputs.version }}-darwin-arm64.tar.gz
            dist/checksums/SHA256SUMS
            templates/docker-compose.release.example.yml
            templates/docker-compose.postgres-only.yml
            templates/seacontroll-http.yaml
            templates/seacontroll-http.local-binary.yaml
            templates/seacontroll-mqtt.yaml
